<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Prompt Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .prompt-container {
            background: #1e293b;
            color: #38bdf8;
            font-family: 'Courier New', Courier, monospace;
        }
        .copy-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-12 px-4">

    <!-- Header -->
    <div class="max-w-4xl w-full text-center mb-10">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Universal Website Prompt Architect</h1>
        <p class="text-slate-600 text-lg">Input business data to generate a "Master Command" that builds a full website in any AI tool.</p>
    </div>

    <!-- Main Tool Container -->
    <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <!-- Input Panel -->
        <div class="glass-card p-8 rounded-2xl shadow-xl">
            <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center">
                <i class="fas fa-edit mr-2 text-blue-600"></i> Business Details
            </h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Business Name</label>
                    <input type="text" id="bizName" placeholder="e.g. Sharma Engineering and Workshop" 
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Google Maps URL</label>
                    <input type="text" id="mapsUrl" placeholder="https://maps.app.goo.gl/..." 
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Maps Iframe Code (Optional)</label>
                    <textarea id="iframeCode" rows="2" placeholder='<iframe src="..." ...></iframe>' 
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Founder Name</label>
                        <input type="text" id="founder" placeholder="e.g. Sudhakar Sharma" 
                            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Industry</label>
                        <input type="text" id="industry" placeholder="e.g. Engineering" 
                            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Key Services (Comma separated)</label>
                    <input type="text" id="services" placeholder="Cultivators, SS Gates, Lathe Work" 
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Social Media Links</label>
                    <input type="text" id="socials" placeholder="Instagram: @handle, FB: link" 
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>

            <button onclick="generatePrompt()" 
                class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg hover:shadow-blue-200">
                Generate Master Prompt <i class="fas fa-magic ml-2"></i>
            </button>
        </div>

        <!-- Output Panel -->
        <div class="flex flex-col">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-slate-800">Ready-to-Use Prompt</h2>
                <button onclick="copyPrompt()" class="copy-button text-sm bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg font-bold text-slate-700 transition-all flex items-center">
                    <i class="fas fa-copy mr-2"></i> Copy Prompt
                </button>
            </div>
            
            <div id="outputContainer" class="prompt-container flex-grow p-6 rounded-2xl shadow-inner text-sm overflow-y-auto leading-relaxed border border-slate-800 whitespace-pre-wrap">
                Fill out the form to generate your universal AI command.
            </div>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none font-bold">
        Copied to clipboard!
    </div>

    <script>
        function generatePrompt() {
            const bizName = document.getElementById('bizName').value || "[Business Name]";
            const mapsUrl = document.getElementById('mapsUrl').value || "[Maps URL]";
            const iframeCode = document.getElementById('iframeCode').value || "[Iframe Code]";
            const founder = document.getElementById('founder').value || "Lead Director";
            const industry = document.getElementById('industry').value || "General Industry";
            const services = document.getElementById('services').value || "Core Industry Services";
            const socials = document.getElementById('socials').value || "Social Media Presence";

            const template = `**Role:** Senior Full-Stack Developer, SEO Expert, and Conversion Architect.
**Goal:** Build a production-ready, SEO-optimized single-page website in ONE code block.

**[BUSINESS IDENTITY]**
- Name: ${bizName}
- Industry: ${industry}
- Google Maps URL: ${mapsUrl}
- Maps Iframe: ${iframeCode}
- Leadership: ${founder}
- Key Offerings: ${services}
- Socials: ${socials}

**[COMMAND 1: RESEARCH & SEO]**
1. Identify high-intent local SEO keywords for "${bizName}" in its specific location.
2. Generate JSON-LD LocalBusiness Schema for the head section.
3. Write meta tags for search engine optimization.

**[COMMAND 2: TRUST & SOCIAL PROOF]**
1. Create a "Trust Bar" highlighting the Google Maps 4.9-star rating.
2. Build a "Leadership Profile" section for ${founder} emphasizing technical expertise.
3. Include a dedicated "Why Choose Us" section based on industry best practices.

**[COMMAND 3: DESIGN & DEV]**
1. Use Tailwind CSS for a mobile-first, high-performance UI.
2. Color Palette: Industry-specific (Professional & Modern).
3. Sections: Sticky Nav, Hero with WhatsApp CTA, Service Matrix (Icons included), Photo Gallery (placeholders), Founder Message, Contact with Google Maps Iframe, and Social Footer.
4. WhatsApp Integration: Link to trigger a "Get Quote" message.

**[OUTPUT REQUIREMENT]**
Provide the complete HTML5/Tailwind code in a single file. Ensure all links work and copy is high-converting. NO EXPLANATION, JUST THE SOURCE CODE.`;

            document.getElementById('outputContainer').textContent = template;
        }

        function copyPrompt() {
            const text = document.getElementById('outputContainer').textContent;
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
